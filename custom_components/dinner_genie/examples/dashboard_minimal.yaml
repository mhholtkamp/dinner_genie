views:
  - title: Savelio
    path: dinner-genie
    icon: mdi:silverware-fork-knife
    cards:
      - type: entities
        title: Savelio
        entities:
          - button.dinner_genie_kies_willekeurig_gerecht

      - type: custom:savelio-card-v3017
        mode: week
        title: Weekplanning
        days_entity: number.dinner_genie_aantal_dagen

      - type: todo-list
        entity: todo.dinner_genie_boodschappen
        title: Boodschappen
  - type: button
    entity: button.dinner_genie_stuur_boodschappen_naar_ha_en_leeg_savelio
    tap_action:
      action: call-service
      service: button.press
      target:
        entity_id: button.dinner_genie_stuur_boodschappen_naar_ha_en_leeg_savelio
      confirmation:
        text: Wil je de boodschappen naar Home Assistant sturen en daarna de Savelio boodschappenlijst legen?
