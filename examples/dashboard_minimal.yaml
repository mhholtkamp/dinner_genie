views:
  - title: Savelio
    path: dinner-genie
    icon: mdi:silverware-fork-knife
    cards:
      - type: entities
        title: Savelio
        entities:
          - button.dinner_genie_kies_willekeurig_gerecht

      - type: custom:savelio-card-v3017
        mode: week
        title: Weekplanning
        days_entity: number.dinner_genie_aantal_dagen

      - type: todo-list
        entity: todo.dinner_genie_boodschappen
        title: Boodschappen
  - type: button
    name: Stuur naar HA en leeg Savelio
    icon: mdi:cart-check
    tap_action:
      action: call-service
      service: dinner_genie.send_shopping_to_ha_and_clear
      confirmation:
        text: Wil je de boodschappen naar Home Assistant sturen en daarna de Savelio boodschappenlijst legen?
