views:
  - type: sections
    title: Savelio
    path: dinner-genie
    icon: mdi:silverware-fork-knife
    max_columns: 3
    sections:
      - type: grid
        column_span: 3
        cards:
          - type: custom:savelio-card-v3017
            mode: week
            title: Savelio weekplanning
            days_entity: number.dinner_genie_aantal_dagen
            max_days: 7
          - type: custom:savelio-card-v3017
            mode: today
            title: Vandaag
            days_entity: number.dinner_genie_aantal_dagen

  - type: sections
    title: Recepten
    path: recepten
    icon: mdi:book-open-variant
    max_columns: 3
    sections:
      - type: grid
        column_span: 3
        cards:
          - type: custom:savelio-card-v3017
            mode: recipes
            title: 📖 Recepten
            recipes_entity: sensor.dinner_genie_recepten

  - type: sections
    title: Boodschappen
    path: boodschappen
    icon: mdi:cart
    max_columns: 2
    sections:
      - type: grid
        column_span: 2
        cards:
          - type: todo-list
            entity: todo.dinner_genie_boodschappen
            title: Boodschappen
          - type: button
            entity: button.dinner_genie_stuur_boodschappen_naar_ha_lijst
          - type: button
            entity: button.dinner_genie_leeg_savelio_boodschappenlijst
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.dinner_genie_leeg_savelio_boodschappenlijst
              confirmation:
                text: Wil je de Savelio boodschappenlijst legen?
