name: Python checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Compile custom component
        run: python -m compileall custom_components/dinner_genie
